name: quality gates (reusable)

on:
  workflow_call:
    inputs:
      python:
        type: boolean
        default: false
      node:
        type: boolean
        default: false
      rust:
        type: boolean
        default: false
      coverage_threshold:
        type: number
        default: 80
      python_version:
        type: string
        default: '3.12'
      node_version:
        type: string
        default: '20'
    secrets:
      ORG_ADMIN_TOKEN:
        required: false

jobs:
  detect:
    name: Detect project types
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.check.outputs.python }}
      node: ${{ steps.check.outputs.node }}
      rust: ${{ steps.check.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for project files
        id: check
        run: |
          python=0
          node=0
          rust=0

          [ -f "pyproject.toml" ] || [ -f "requirements.txt" ] || [ -f "setup.py" ] && python=1
          [ -f "package.json" ] && node=1
          [ -f "Cargo.toml" ] && rust=1

          echo "python=$python" >> $GITHUB_OUTPUT
          echo "node=$node" >> $GITHUB_OUTPUT
          echo "rust=$rust" >> $GITHUB_OUTPUT
          echo "Detected: python=$python node=$node rust=$rust"

  python-quality:
    name: Python — lint / type / coverage
    needs: detect
    if: needs.detect.outputs.python == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure git for private deps
        env:
          HAS_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN != '' }}
        if: env.HAS_TOKEN == 'true'
        run: |
          git config --global url."https://${{ secrets.ORG_ADMIN_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check . --output-format=github

      - name: Ruff format
        run: uv run ruff format --check .

      - name: MyPy type check
        run: uv run mypy . --ignore-missing-imports
        continue-on-error: true

      - name: pytest + coverage
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage_threshold }} \
            -m "not e2e" \
            -q
        continue-on-error: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  node-quality:
    name: Node — lint / type / build
    needs: detect
    if: needs.detect.outputs.node == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint --if-present

      - name: Type check
        run: |
          pnpm run type-check --if-present || \
          pnpm run typecheck --if-present || \
          pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

  rust-quality:
    name: Rust — fmt / clippy / test
    needs: detect
    if: needs.detect.outputs.rust == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --all-features

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [python-quality, node-quality, rust-quality]
    if: always()
    steps:
      - name: Evaluate gates
        run: |
          FAILED=false
          for result in \
            "${{ needs.python-quality.result }}" \
            "${{ needs.node-quality.result }}" \
            "${{ needs.rust-quality.result }}"; do
            [ "$result" == "failure" ] && FAILED=true
          done
          if $FAILED; then
            echo "One or more quality gates failed."
            exit 1
          fi
          echo "All quality gates passed."
