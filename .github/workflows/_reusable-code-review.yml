name: code review (reusable)

on:
  workflow_call:
    inputs:
      mode:
        type: string
        default: 'audit'
      fail_on:
        type: string
        default: 'CRITICAL'
      model:
        type: string
        default: ''   # falls back to org var LLM_MODEL
      base_url:
        type: string
        default: ''   # falls back to org var LLM_BASE_URL
    secrets:
      OPENROUTER_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      ZAI_API_KEY:
        required: false
      ORG_ADMIN_TOKEN:
        required: true

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo under review
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve LLM config
        id: llm
        run: |
          # Caller input takes precedence; fall back to org-level vars
          MODEL="${{ inputs.model }}"
          BASE_URL="${{ inputs.base_url }}"
          [ -z "$MODEL" ]    && MODEL="${{ vars.LLM_MODEL }}"
          [ -z "$BASE_URL" ] && BASE_URL="${{ vars.LLM_BASE_URL }}"
          echo "model=$MODEL"       >> $GITHUB_OUTPUT
          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT
          echo "Using model: $MODEL @ $BASE_URL"

      - name: Determine context
        id: ctx
        run: |
          MODE="${{ inputs.mode }}"
          case "$MODE" in
            audit)
              BASE="${{ github.event.before }}"
              if [ -z "$BASE" ] || [[ "$BASE" =~ ^0+$ ]]; then
                BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "${{ github.sha }}")
              fi
              echo "base=$BASE" >> $GITHUB_OUTPUT
              echo "head=${{ github.sha }}" >> $GITHUB_OUTPUT
              ;;
            pr-review)
              echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
              echo "head=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
              echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
              ;;
            issue-triage|issue-fix)
              echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
              echo "base=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
              echo "head=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Run code reviewer
        uses: ZySec-AI/code-reviewer@develop
        with:
          mode: ${{ inputs.mode }}
          zai-api-key: ${{ secrets.OPENROUTER_API_KEY || secrets.ANTHROPIC_API_KEY || secrets.OPENAI_API_KEY || secrets.ZAI_API_KEY }}
          zai-base-url: ${{ steps.llm.outputs.base_url }}
          model: ${{ steps.llm.outputs.model }}
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          base-sha: ${{ steps.ctx.outputs.base }}
          head-sha: ${{ steps.ctx.outputs.head }}
          pr-number: ${{ steps.ctx.outputs.pr_number }}
          issue-number: ${{ steps.ctx.outputs.issue_number }}
          fail-on: ${{ inputs.fail_on }}
