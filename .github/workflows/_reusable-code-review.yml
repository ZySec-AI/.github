name: code review (reusable)

# Reusable workflow called by every repo on develop merges.
# Runs Claude Code in a container against z.ai's GLM-5.1.
#
# Caller wires it like:
#
#   jobs:
#     review:
#       uses: ZySec-AI/.github/.github/workflows/_reusable-code-review.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Container image tag to use'
        type: string
        default: 'latest'
      fail_on:
        description: 'Severity that fails the job (CRITICAL | HIGH | MEDIUM | NEVER)'
        type: string
        default: 'CRITICAL'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: range
        run: |
          # For push events: github.event.before → github.sha
          # For pull_request: base ref → head ref
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "head=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            BASE="${{ github.event.before }}"
            # First push to a branch has before = 0000... — fall back to develop~1
            if [ -z "$BASE" ] || [[ "$BASE" =~ ^0+$ ]]; then
              BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "${{ github.sha }}")
            fi
            echo "base=$BASE" >> $GITHUB_OUTPUT
            echo "head=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run code reviewer
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          ORG_BOOTSTRAP_TOKEN: ${{ secrets.ORG_BOOTSTRAP_TOKEN }}
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -e ANTHROPIC_BASE_URL="https://api.z.ai/api/anthropic" \
            -e ANTHROPIC_AUTH_TOKEN="$ZAI_API_KEY" \
            -e GH_TOKEN="$ORG_BOOTSTRAP_TOKEN" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e BASE_SHA="${{ steps.range.outputs.base }}" \
            -e HEAD_SHA="${{ steps.range.outputs.head }}" \
            -e REVIEW_FAIL_ON="${{ inputs.fail_on }}" \
            ghcr.io/zysec-ai/code-reviewer:${{ inputs.image_tag }}
