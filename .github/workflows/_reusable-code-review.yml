name: code review (reusable)

on:
  workflow_call:
    inputs:
      mode:
        type: string
        default: 'audit'
      fail_on:
        type: string
        default: 'CRITICAL'
    secrets:
      ANTHROPIC_BASE_URL:
        required: true
      ANTHROPIC_AUTH_TOKEN:
        required: true
      LLM_MODEL:
        required: true
      ORG_ADMIN_TOKEN:
        required: true
    outputs:
      result:
        description: "Result of the code review"
        value: ${{ jobs.review.outputs.result }}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    uses: ZySec-AI/code-reviewer/.github/workflows/reusable.yml@main
    secrets:
      anthropic-base-url: ${{ secrets.ANTHROPIC_BASE_URL }}
      anthropic-auth-token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      llm-model: ${{ secrets.LLM_MODEL }}
      github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
    with:
      mode: ${{ inputs.mode }}
      fail_on: ${{ inputs.fail_on }}
