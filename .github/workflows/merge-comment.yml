name: PR checklist comment

on:
  pull_request:
    types: [opened, reopened]
    branches: [develop]

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Find existing bot comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- zysec-pr-checklist -->"

      - name: Post or update ZySec PR checklist
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const actor = pr.user.login;
            const docsBase = 'https://github.com/ZySec-AI/devops-practices/blob/develop';
            const existingId = '${{ steps.find-comment.outputs.comment-id }}';

            const body = `<!-- zysec-pr-checklist -->
## Hey @${actor} — here's what runs before this PR can merge

### Security — blocks merge if any fail
| Check | Tool | Fails if |
|-------|------|---------|
| Secret scan | Gitleaks | Any verified secret found |
| SAST (Python) | Bandit | HIGH or CRITICAL severity |
| Deep SAST | CodeQL | Any security finding |
| Dependency CVE | Trivy | HIGH or CRITICAL CVE |
| License check | Dependency Review | Unapproved license added |

### Quality — blocks merge if any fail
| Check | Tool | Fails if |
|-------|------|---------|
| Lint + format (Python) | Ruff | Any error |
| Test coverage | pytest-cov | Below 80% |
| ESLint | ESLint | Any lint error |
| TypeScript | tsc | Any type error |
| Build | pnpm build | Build fails |

### Branch & PR standards — blocks merge if any fail
| Check | Fails if |
|-------|---------|
| PR description | Empty or < 20 chars |
| Merge flow | Invalid source → target |
| Approving review | At least 1 required |
| Resolved conversations | All must be resolved |

### Labels to set
| Label | When |
|-------|------|
| \`type:feature\` | New functionality |
| \`type:bug\` | Defect or regression |
| \`type:chore\` | Maintenance, deps |
| \`type:docs\` | Documentation only |
| \`hotfix\` | Bypasses code freeze |
| \`bot-skip\` | Skip AI review |
| \`qa-approved\` | Required before merging to release |

📚 [Engineering Practices](https://github.com/ZySec-AI/devops-practices) · [Branch Strategy](${docsBase}/03-Operational-Practices/branch-strategy.md)`;

            if (existingId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(existingId),
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
