name: PR checklist comment

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [develop]

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Find existing bot comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- zysec-pr-checklist -->"

      - name: Post or update ZySec PR checklist
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const actor = pr.user.login;
            const docsBase = 'https://github.com/ZySec-AI/devops-practices/blob/develop';
            const existingId = '${{ steps.find-comment.outputs.comment-id }}';
            const body = "<!-- zysec-pr-checklist -->" +
            "\\n" +
            "## 👋 Hey @" + actor + " — here's what will run before this PR can merge" +
            "\\n" +
            "\\n" +
            "All checks below are **automated and enforced**. Review them now so you're not blocked at review time." +
            "\\n" +
            "\\n" +
            "---" +
            "\\n" +
            "\\n" +
            "### 🔐 Security — will block merge if any fail" +
            "\\n" +
            "| Check | Tool | Fails if |" +
            "\\n" +
            "|-------|------|----------|" +
            "\\n" +
            "| Secret & credential scan (full git history) | Gitleaks | Any verified secret found |" +
            "\\n" +
            "| Python SAST — injection, weak crypto, hardcoded creds | Bandit | HIGH or CRITICAL severity |" +
            "\\n" +
            "| Deep multi-language SAST | CodeQL | Any security finding |" +
            "\\n" +
            "| Dependency CVE scan | Trivy | HIGH or CRITICAL CVE in deps |" +
            "\\n" +
            "| Container image CVE scan | Trivy | HIGH or CRITICAL CVE in image |" +
            "\\n" +
            "| New dependency license check | Dependency Review | Unapproved license added |" +
            "\\n" +
            "| New dependency CVE check | Dependency Review | HIGH+ CVE in new dep |" +
            "\\n" +
            "\\n" +
            "### ✅ Quality — will block merge if any fail" +
            "\\n" +
            "| Check | Tool | Fails if |" +
            "\\n" +
            "|-------|------|----------|" +
            "\\n" +
            "| Linting + format check (Python) | Ruff | Any lint or format error |" +
            "\\n" +
            "| Type checking (Python) | MyPy | *(advisory — does not block)* |" +
            "\\n" +
            "| Test coverage | pytest-cov | Coverage drops below **80%** |" +
            "\\n" +
            "| ESLint (TypeScript / JS) | ESLint | Any lint error |" +
            "\\n" +
            "| TypeScript type check | tsc | Any type error |" +
            "\\n" +
            "| Build check (Node) | pnpm build | Build fails |" +
            "\\n" +
            "| Format + lint (Rust) | cargo fmt + Clippy | Any warning |" +
            "\\n" +
            "| Tests (Rust) | cargo test | Any test fails |" +
            "\\n" +
            "\\n" +
            "### 🌿 Branch & PR standards — will block merge if any fail" +
            "\\n" +
            "| Check | Fails if |" +
            "\\n" +
            "|-------|----------|" +
            "\\n" +
            "| Branch name convention | Doesn't match `type/description` (e.g. `feat/my-feature`) |" +
            "\\n" +
            "| Merge flow | Invalid source → target (feature branches must target `develop`) |" +
            "\\n" +
            "| PR description | Body is empty or < 20 chars |" +
            "\\n" +
            "| PR label | No `type:feature`, `type:bug`, `type:chore`, or `type:docs` label |" +
            "\\n" +
            "| Approving review | At least 1 approval required |" +
            "\\n" +
            "| Resolved conversations | All comments must be resolved |" +
            "\\n" +
            "\\n" +
            "### 🤖 AI review — advisory, does not block" +
            "\\n" +
            "An AI reviewer will post inline comments on security, quality, and logic issues. It won't block merge but findings are worth addressing." +
            "\\n" +
            "\\n" +
            "---" +
            "\\n" +
            "\\n" +
            "<details>" +
            "\\n" +
            "<summary>🌿 Branch naming quick reference</summary>" +
            "\\n" +
            "\\n" +
            "**Format:** `type/short-description` — lowercase, hyphens only, no underscores" +
            "\\n" +
            "\\n" +
            "| Prefix | Use for |" +
            "\\n" +
            "|--------|---------|" +
            "\\n" +
            "| `feat/` or `feature/` | New features |" +
            "\\n" +
            "| `fix/` or `bugfix/` | Bug fixes |" +
            "\\n" +
            "| `hotfix/` | Urgent production fixes only |" +
            "\\n" +
            "| `chore/` | Maintenance, deps, config |" +
            "\\n" +
            "| `docs/` | Documentation only |" +
            "\\n" +
            "| `refactor/` | Refactoring without behaviour change |" +
            "\\n" +
            "| `test/` | Test additions or fixes |" +
            "\\n" +
            "| `ci/` | CI/CD pipeline changes |" +
            "\\n" +
            "\\n" +
            "**Good:** `feat/oauth-login` · `fix/cors-header-leak` · `chore/bump-fastapi-0.112`" +
            "\\n" +
            "\\n" +
            "**Bad:** `my-branch` · `Feature/LoginPage` · `fix_cors` · `john/working`" +
            "\\n" +
            "\\n" +
            "**Standard flow:** `feat/… → develop → stage → release`" +
            "\\n" +
            "\\n" +
            "**Code freeze:** Soft Thu 4 PM IST · Hard Fri 3 PM IST · No new feature PRs after freeze" +
            "\\n" +
            "\\n" +
            "</details>" +
            "\\n" +
            "\\n" +
            "<details>" +
            "\\n" +
            "<summary>🏷️ Labels you should set on this PR</summary>" +
            "\\n" +
            "\\n" +
            "Add exactly one `type:*` label — the PR standards check will fail without it:" +
            "\\n" +
            "\\n" +
            "| Label | When to use |" +
            "\\n" +
            "|-------|------------|" +
            "\\n" +
            "| `type:feature` | New functionality |" +
            "\\n" +
            "| `type:bug` | Defect or regression |" +
            "\\n" +
            "| `type:chore` | Maintenance, deps, config |" +
            "\\n" +
            "| `type:docs` | Documentation only |" +
            "\\n" +
            "\\n" +
            "Other useful labels:" +
            "\\n" +
            "| Label | Effect |" +
            "\\n" +
            "|-------|--------|" +
            "\\n" +
            "| `hotfix` | Bypasses code freeze, fast-tracks review |" +
            "\\n" +
            "| `bot-skip` | Skips AI review for this PR |" +
            "\\n" +
            "| `bot-fix-please` | Ask the AI to raise a fix PR for an issue |" +
            "\\n" +
            "\\n" +
            "</details>" +
            "\\n" +
            "\\n" +
            "---" +
            "\\n" +
            "\\n" +
            "📚 **Learn more:** [ZySec Engineering Practices](https://github.com/ZySec-AI/devops-practices) · [Branch Strategy](" + docsBase + "/03-Operational-Practices/branch-strategy.md) · [All 69 Controls](" + docsBase + "/03-Operational-Practices/workflow-controls.md) · [Secure Coding](" + docsBase + "/05-Security-and-Governance/secure-coding-guidelines.md) · [Testing & QA](" + docsBase + "/02-Coding-Guidelines/testing-and-quality-assurance.md)" +
            "\\n" +
            "\\n" +
            "*This comment updates automatically if you push new commits.*";
            if (existingId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(existingId),
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
