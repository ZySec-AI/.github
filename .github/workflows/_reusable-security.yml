name: security scan (reusable)

on:
  workflow_call:
    inputs:
      python:
        type: boolean
        default: false
      node:
        type: boolean
        default: false
      rust:
        type: boolean
        default: false
      docker:
        type: boolean
        default: false
      image_ref:
        type: string
        default: ''
    secrets:
      ORG_ADMIN_TOKEN:
        required: true
      TRIVY_TEAM_WEBHOOK:
        required: false

jobs:
  detect:
    name: Detect project types
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.check.outputs.python }}
      node: ${{ steps.check.outputs.node }}
      rust: ${{ steps.check.outputs.rust }}
      docker: ${{ steps.check.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for project files
        id: check
        run: |
          python=0
          node=0
          rust=0
          docker=0

          [ -f "pyproject.toml" ] || [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "setup.cfg" ] && python=1
          [ -f "package.json" ] && node=1
          [ -f "Cargo.toml" ] && rust=1
          [ -f "Dockerfile" ] && docker=1

          echo "python=$python" >> $GITHUB_OUTPUT
          echo "node=$node" >> $GITHUB_OUTPUT
          echo "rust=$rust" >> $GITHUB_OUTPUT
          echo "docker=$docker" >> $GITHUB_OUTPUT
          echo "Detected: python=$python node=$node rust=$rust docker=$docker"

  secret-scan:
    name: Secret Scan (gitleaks)
    needs: detect
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast-python:
    name: SAST — bandit (Python)
    needs: detect
    if: needs.detect.outputs.python == '1'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        run: |
          bandit -r . \
            --exclude './.venv,./venv,./node_modules,./tests,./test' \
            -ll \
            -f sarif \
            -o bandit.sarif || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit
      - name: Fail on high/critical
        run: |
          bandit -r . \
            --exclude './.venv,./venv,./node_modules,./tests,./test' \
            -lll \
            -f txt

  sast-codeql:
    name: SAST — CodeQL
    needs: detect
    if: (needs.detect.outputs.python == '1' || needs.detect.outputs.node == '1') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.python == '1' && needs.detect.outputs.node == '1' && '["python","javascript"]' || needs.detect.outputs.python == '1' && '["python"]' || needs.detect.outputs.node == '1' && '["javascript"]' || '[]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dep-review:
    name: Dependency Review
    needs: detect
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, MPL-2.0
          comment-summary-in-pr: true

  trivy-fs:
    name: Trivy — filesystem scan
    needs: detect
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy (filesystem)
        env:
          TRIVY_TOKEN: ${{ secrets.TRIVY_TEAM_WEBHOOK }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: Trivy — container image scan
    needs: detect
    if: needs.detect.outputs.docker == '1' && inputs.image_ref != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy (image)
        env:
          TRIVY_TOKEN: ${{ secrets.TRIVY_TEAM_WEBHOOK }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ inputs.image_ref }}
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
