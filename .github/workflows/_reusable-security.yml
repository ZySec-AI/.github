# =============================================================================
# WORKFLOW: Reusable - Security Scanning
# PURPOSE:  Runs gitleaks secret scan, bandit SAST, CodeQL, dependency-review,
#           trivy filesystem + container scans, and auto-opens GitHub issues
#           for HIGH/CRITICAL findings on non-PR runs (push/schedule).
# TRIGGERS: workflow_call
# INPUTS:   python (bool, default true), node (bool, default true),
#           rust (bool, default false), fast-mode (bool, default false)
# SECRETS:  ORG_ADMIN_TOKEN, TRIVY_TEAM_WEBHOOK (optional)
# WHY fast-mode: hotfix path needs <5min; skips CodeQL (slow) but keeps
#                gitleaks + trivy (fast, highest-value for hotfixes)
# CONTACT:  platform-eng@zysec.ai
# =============================================================================
name: security scan (reusable)

on:
  workflow_call:
    inputs:
      python:
        description: 'Enable Python-specific scans (bandit, CodeQL python)'
        type: boolean
        default: true
      node:
        description: 'Enable Node-specific scans (CodeQL javascript)'
        type: boolean
        default: true
      rust:
        description: 'Enable Rust-specific scans'
        type: boolean
        default: false
      docker:
        type: boolean
        default: false
      image_ref:
        type: string
        default: ''
      fast-mode:
        description: 'Skip slow scans (CodeQL, bandit) - used by hotfix fast-path'
        type: boolean
        default: false
    secrets:
      ORG_ADMIN_TOKEN:
        required: true
      TRIVY_TEAM_WEBHOOK:
        required: false

jobs:
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@44c470e531f84e7b3946e6e6326d54d5dfece8d5  # v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast-python:
    name: SAST - bandit (Python)
    if: inputs.python && !inputs.fast-mode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit (SARIF output)
        run: |
          bandit -r . \
            --exclude './.venv,./venv,./node_modules,./tests,./test' \
            -ll -f sarif -o bandit.sarif || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit
      - name: Fail on HIGH/CRITICAL findings
        run: |
          bandit -r . \
            --exclude './.venv,./venv,./node_modules,./tests,./test' \
            -lll -f txt

  sast-codeql:
    name: SAST - CodeQL
    if: (inputs.python || inputs.node) && !inputs.fast-mode
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(
          (inputs.python && inputs.node) && '["python","javascript"]' ||
          inputs.python && '["python"]' ||
          inputs.node && '["javascript"]' ||
          '[]') }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
      - uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        with:
          category: "/language:${{ matrix.language }}"

  dep-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/dependency-review-action@da24556e06b3e2a6ba83fa51aef0e0c38e2ad742  # v4.7.1
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, MPL-2.0
          comment-summary-in-pr: true
        continue-on-error: true

  trivy-fs:
    name: Trivy - filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@a20de5420d57c4102486cdd9349b532bf5b3c8e7  # v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: Trivy - container image scan
    if: inputs.docker && inputs.image_ref != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@a20de5420d57c4102486cdd9349b532bf5b3c8e7  # v0.28.0
        with:
          image-ref: ${{ inputs.image_ref }}
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image.sarif
      - uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  open-security-issues:
    name: Open issues for findings
    runs-on: ubuntu-latest
    needs: [secret-scan, trivy-fs]
    if: always() && github.event_name != 'pull_request'
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Re-run trivy for JSON output
        uses: aquasecurity/trivy-action@a20de5420d57c4102486cdd9349b532bf5b3c8e7  # v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: json
          output: trivy-findings.json
        continue-on-error: true
      - name: Open GitHub issues for findings
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
        run: |
          python3 - << 'PYEOF'
          import json, os, subprocess, sys

          repo = os.environ["REPO"]
          ref = os.environ["REF"]
          sha = os.environ["SHA"][:8]
          secret_result = os.environ["SECRET_SCAN_RESULT"]

          def open_issue_if_new(title, body, labels):
              result = subprocess.run(
                  ["gh", "issue", "list", "--repo", repo, "--state", "open",
                   "--search", title, "--json", "number", "--jq", ".[0].number"],
                  capture_output=True, text=True)
              if result.stdout.strip():
                  print(f"  deduped: #{result.stdout.strip()} already open")
                  return
              subprocess.run(
                  ["gh", "issue", "create", "--repo", repo,
                   "--title", title, "--label", labels, "--body", body],
                  capture_output=True)
              print(f"  opened: {title}")

          # Parse trivy JSON findings
          try:
              with open("trivy-findings.json") as f:
                  data = json.load(f)
              results = data.get("Results", [])
              for r in results:
                  for vuln in r.get("Vulnerabilities", []):
                      sev = vuln.get("Severity", "")
                      if sev not in ("HIGH", "CRITICAL"):
                          continue
                      vid = vuln.get("VulnerabilityID", "unknown")
                      pkg = vuln.get("PkgName", "unknown")
                      installed = vuln.get("InstalledVersion", "?")
                      fixed = vuln.get("FixedVersion", "no fix available")
                      title = f"security: {vid} ({sev}) in {pkg}@{installed}"
                      body = (
                          f"## Security Finding - {sev}\n\n"
                          f"**CVE:** {vid}\n"
                          f"**Package:** `{pkg}` @ `{installed}`\n"
                          f"**Fix available:** `{fixed}`\n"
                          f"**Branch:** `{ref}` @ `{sha}`\n\n"
                          f"### Remediation\n"
                          f"Upgrade `{pkg}` to `{fixed}` or add to `.trivyignore` with justification.\n\n"
                          f"---\n*Auto-opened by trivy scan on push to `{ref}`*"
                      )
                      labels = f"dimension:security,severity:{sev.lower()},type:bug"
                      open_issue_if_new(title, body, labels)
          except Exception as e:
              print(f"trivy parse error (non-fatal): {e}")

          # Open issue if gitleaks failed
          if secret_result == "failure":
              title = f"security: secret detected in {ref} @ {sha}"
              body = (
                  f"## Secret Detected by Gitleaks\n\n"
                  f"**Branch:** `{ref}` @ `{sha}`\n\n"
                  f"### Immediate actions\n"
                  f"1. Identify and rotate the exposed credential immediately\n"
                  f"2. Run locally: `brew install gitleaks && gitleaks detect --source .`\n"
                  f"3. Rewrite history or make repo private if secret is in git history\n\n"
                  f"---\n*Auto-opened by gitleaks scan on push to `{ref}`*"
              )
              open_issue_if_new(title, body, "dimension:security,severity:critical,type:bug")

          print("done")
          PYEOF
