# =============================================================================
# WORKFLOW: Reusable — Security Scanning
# PURPOSE:  Runs gitleaks secret scan, bandit SAST, CodeQL, dependency-review,
#           trivy filesystem + container scans, and auto-opens GitHub issues
#           for HIGH/CRITICAL findings on non-PR runs (push/schedule).
# TRIGGERS: workflow_call
# INPUTS:   python (bool, default true), node (bool, default true),
#           rust (bool, default false), fast-mode (bool, default false)
# SECRETS:  ORG_ADMIN_TOKEN, TRIVY_TEAM_WEBHOOK (optional)
# WHY fast-mode: hotfix path needs < 5min; skips CodeQL (slow) but keeps
#                gitleaks + trivy (fast, highest-value for hotfixes)
# CONTACT:  platform-eng@zysec.ai
# =============================================================================
name: security scan (reusable)

on:
  workflow_call:
    inputs:
      python:
        description: 'Enable Python-specific scans (bandit, CodeQL python)'
        type: boolean
        default: true
      node:
        description: 'Enable Node-specific scans (CodeQL javascript)'
        type: boolean
        default: true
      rust:
        description: 'Enable Rust-specific scans'
        type: boolean
        default: false
      docker:
        type: boolean
        default: false
      image_ref:
        type: string
        default: ''
      fast-mode:
        description: 'Skip slow scans (CodeQL, bandit) — used by hotfix fast-path'
        type: boolean
        default: false
    secrets:
      ORG_ADMIN_TOKEN:
        required: true
      TRIVY_TEAM_WEBHOOK:
        required: false

jobs:
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Run gitleaks
        # PINNED: was gitleaks/gitleaks-action@v2 (mutable tag)
        # If this fails: a secret was found in the diff. Run gitleaks locally:
        #   brew install gitleaks && gitleaks detect --source .
        uses: gitleaks/gitleaks-action@44c470e531f84e7b3946e6e6326d54d5dfece8d5  # v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # REMOVED: continue-on-error: true — secret leaks must block merge

  sast-python:
    name: SAST — bandit (Python)
    if: inputs.python && !inputs.fast-mode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit (SARIF output for Security tab)
        run: |
          bandit -r . \
            --exclude './.venv,./venv,./node_modules,./tests,./test' \
            -ll \
            -f sarif \
            -o bandit.sarif || true
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit
      - name: Fail on HIGH/CRITICAL findings
        # If this fails: bandit found a HIGH/CRITICAL issue. Check Security tab
        # or run: bandit -r . -lll
        run: |
          bandit -r . \
            --exclude './.venv,./venv,./node_modules,./tests,./test' \
            -lll \
            -f txt

  sast-codeql:
    name: SAST — CodeQL
    if: (inputs.python || inputs.node) && !inputs.fast-mode
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(
          (inputs.python && inputs.node) && '["python","javascript"]' ||
          inputs.python && '["python"]' ||
          inputs.node && '["javascript"]' ||
          '[]') }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
      - uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        with:
          category: "/language:${{ matrix.language }}"

  dep-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/dependency-review-action@da24556e06b3e2a6ba83fa51aef0e0c38e2ad742  # v4.7.1
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, MPL-2.0
          comment-summary-in-pr: true
        continue-on-error: true

  trivy-fs:
    name: Trivy — filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Trivy (filesystem)
        # PINNED: was aquasecurity/trivy-action@master (floating branch — supply chain risk)
        # If this fails: Trivy found HIGH/CRITICAL CVEs. Check Security tab or run:
        #   trivy fs --severity HIGH,CRITICAL .
        uses: aquasecurity/trivy-action@a20de5420d57c4102486cdd9349b532bf5b3c8e7  # v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: Trivy — container image scan
    if: inputs.docker && inputs.image_ref != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@a20de5420d57c4102486cdd9349b532bf5b3c8e7  # v0.28.0
        with:
          image-ref: ${{ inputs.image_ref }}
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image.sarif
      - uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f  # v3.28.18
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  open-security-issues:
    name: Open issues for findings
    runs-on: ubuntu-latest
    # Only on push/schedule — PR scans already surface in the PR checks UI.
    # Opening issues on every PR would create noise for every push to a feature branch.
    if: github.event_name != 'pull_request'
    needs: [secret-scan, trivy-fs]
    # Run even if scans failed — we want issues opened for failures too
    if: github.event_name != 'pull_request' && always()
    permissions:
      issues: write
      contents: read
      security-events: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Open issues for HIGH/CRITICAL findings
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          open_issue_if_new() {
            local TITLE="$1"
            local BODY="$2"
            local LABELS="$3"

            # Dedupe: skip if an open issue with same title already exists
            EXISTING=$(gh issue list --repo "$REPO" --state open \
              --search "$TITLE" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -n "$EXISTING" ]; then
              echo "  ↩ deduped: issue #$EXISTING already open for: $TITLE"
              return
            fi

            gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --label "$LABELS" \
              --body "$BODY" 2>/dev/null \
              && echo "  ✓ opened issue: $TITLE" \
              || echo "  ⚠ failed to open issue (check labels exist)"
          }

          # Parse trivy-fs SARIF if it exists (uploaded as artifact by trivy-fs job)
          # We re-run trivy here in table format to get parseable output — SARIF is
          # too verbose for simple shell parsing and the artifact isn't accessible
          # cross-job without upload/download steps.
          if [ -f "trivy-fs.sarif" ]; then
            echo "→ Parsing trivy-fs SARIF for HIGH/CRITICAL findings..."
            python3 - <<'PYEOF'
          import json, os, subprocess, sys

          with open("trivy-fs.sarif") as f:
              sarif = json.load(f)

          findings = []
          for run in sarif.get("runs", []):
              rules = {r["id"]: r for r in run.get("tool", {}).get("driver", {}).get("rules", [])}
              for result in run.get("results", []):
                  rule_id = result.get("ruleId", "")
                  severity = rules.get(rule_id, {}).get("properties", {}).get("security-severity", "")
                  try:
                      sev_f = float(severity)
                  except (ValueError, TypeError):
                      sev_f = 0.0
                  if sev_f >= 7.0:  # HIGH=7.0, CRITICAL=9.0
                      msg = result.get("message", {}).get("text", "")
                      locs = result.get("locations", [{}])
                      loc = locs[0].get("physicalLocation", {}) if locs else {}
                      uri = loc.get("artifactLocation", {}).get("uri", "unknown")
                      findings.append({"id": rule_id, "severity": "CRITICAL" if sev_f >= 9.0 else "HIGH", "msg": msg, "file": uri})

          with open("/tmp/trivy-findings.json", "w") as f:
              json.dump(findings, f)
          print(f"Trivy findings >= HIGH: {len(findings)}")
          PYEOF
          else
            echo "[]" > /tmp/trivy-findings.json
            echo "→ No trivy-fs.sarif found (scan may not have run)"
          fi

          FINDINGS=$(cat /tmp/trivy-findings.json)
          COUNT=$(echo "$FINDINGS" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")

          if [ "$COUNT" -gt 0 ]; then
            echo "→ Opening issues for $COUNT trivy findings..."
            echo "$FINDINGS" | python3 - <<PYEOF
          import json, sys, subprocess, os

          findings = json.load(sys.stdin)
          repo = os.environ["REPO"]
          ref = os.environ["REF"]
          sha = os.environ["SHA"][:8]

          for f in findings:
              title = f"security: {f['id']} — {f['severity']} CVE in {f['file']}"
              body = f"""## Security Finding — {f['severity']}

          **CVE/Rule:** {f['id']}
          **File:** \`{f['file']}\`
          **Branch:** \`{ref}\` @ \`{sha}\`

          ### Details
          {f['msg']}

          ### Remediation
          1. Check the Security tab for full details
          2. Update the affected dependency: \`trivy fs --severity HIGH,CRITICAL .\`
          3. If unfixable upstream, add to \`.trivyignore\` with a comment explaining why

          ---
          *Auto-opened by security scan on push to \`{ref}\`*"""
              labels = f"dimension:security,severity:{f['severity'].lower()},type:bug"
              subprocess.run(["gh", "issue", "create", "--repo", repo,
                              "--title", title, "--label", labels, "--body", body],
                             capture_output=True)
              print(f"  opened: {title}")
          PYEOF
          else
            echo "→ No HIGH/CRITICAL trivy findings — no issues to open"
          fi

          # Surface gitleaks failure as issue
          if [ "${{ needs.secret-scan.result }}" = "failure" ]; then
            TITLE="security: secret or credential detected in $REF @ ${SHA:0:8}"
            BODY="## Secret Detected by Gitleaks

          Gitleaks found a verified secret or credential committed to \`$REF\`.

          **Commit:** \`$SHA\`
          **Branch:** \`$REF\`

          ### Immediate actions
          1. \`git log --all --full-history -- <file>\` to find the commit
          2. Rotate the exposed credential immediately — treat it as compromised
          3. Rewrite git history or make the repo private if the secret is in history
          4. Run locally: \`brew install gitleaks && gitleaks detect --source .\`

          ---
          *Auto-opened by gitleaks scan on push to \`$REF\`*"
            open_issue_if_new "$TITLE" "$BODY" "dimension:security,severity:critical,type:bug"
          fi