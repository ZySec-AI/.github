name: bootstrap new repositories

on:
  schedule:
    - cron: '0 6 * * *'    # daily 06:00 UTC — new repos bootstrapped same-day
    - cron: '0 7 * * 1'    # weekly Monday 07:00 UTC — drift-correct branch protection
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/new-repo-bootstrap.yml'
      - 'workflow-templates/*.yml'

permissions:
  contents: read

concurrency:
  group: bootstrap-new-repos
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Verify token
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          # Requires ORG_ADMIN_TOKEN with visibility=All repositories
          # and scopes: repo, workflow, admin:org
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::ORG_ADMIN_TOKEN is empty or not visible to this repo."
            exit 1
          fi
          gh auth status

      - name: Find and bootstrap repos
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          REPOS=$(gh api --paginate /orgs/ZySec-AI/repos \
            --jq '.[] | select(.archived==false) | .name')

          # All workflow templates that must exist in every repo.
          # bootstrap installs missing ones — never overwrites existing.
          declare -A WORKFLOWS=(
            # AI-assisted review & triage
            ["develop-pr-automation.yml"]="AI PR review + merge comment on develop PRs"
            ["issue-triage.yml"]="AI issue triage on opened/edited"
            ["issue-auto-fix.yml"]="AI auto-fix on bot-fix-please / auto-fixable label"
            # Branch & merge standards + PR validation (merged)
            ["pr-validation.yml"]="branch naming + merge flow + PR metadata validation"
            # PR hygiene — pull_request_target (merged)
            ["pr-target-checks.yml"]="needs-rebase label + PR dependency ordering"
            # Security
            ["security.yml"]="secret scan + SAST + trivy + dep-review"
            ["hotfix-security.yml"]="full security gate + AI review for release PRs"
            # Quality gates
            ["quality.yml"]="lint + type-check + coverage 80%"
            # Release management
            ["release.yml"]="QA gate + GitHub Release + Teams notification"
            ["audit-release.yml"]="post-merge AI audit on release branch"
            # Sprint process
            ["sprint-retro.yml"]="weekly sprint retro summary issue"
            # License check
            ["check-license.yml"]="block GPL/AGPL/SSPL license text in diff"
            # Security findings backlog
            ["security-findings-to-issues.yml"]="open GitHub issues for CVE findings"
            # Docs sync
            ["docs-to-wiki.yml"]="sync docs/ to GitHub Wiki on develop push"
          )

          apply_branch_protection() {
            local REPO="$1"

            # develop: PR validation + quality + secret scan must pass
            # Status check names: reusable jobs report as "job-key / Job Name",
            # inline jobs report as the job's `name:` field value.
            DEVELOP_EXISTS=$(gh api "/repos/ZySec-AI/$REPO/branches/develop" --silent 2>/dev/null && echo yes || echo no)
            if [ "$DEVELOP_EXISTS" = "yes" ]; then
              gh api -X PUT "/repos/ZySec-AI/$REPO/branches/develop/protection" \
                --input - << 'PAYLOAD'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Branch name + merge flow",
                "Validate PR metadata",
                "gates / Quality Gate",
                "scan / Secret Scan (gitleaks)"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_conversation_resolution": true,
            "required_linear_history": false
          }
          PAYLOAD
              echo "  ✓ develop — branch protection applied"
            fi

            # release: develop checks + full security gate + AI review
            RELEASE_EXISTS=$(gh api "/repos/ZySec-AI/$REPO/branches/release" --silent 2>/dev/null && echo yes || echo no)
            if [ "$RELEASE_EXISTS" = "yes" ]; then
              gh api -X PUT "/repos/ZySec-AI/$REPO/branches/release/protection" \
                --input - << 'PAYLOAD'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Branch name + merge flow",
                "Validate PR metadata",
                "gates / Quality Gate",
                "scan / Secret Scan (gitleaks)",
                "Full Security Gate (non-hotfix)",
                "AI Code Review (blocking on HIGH+)"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_conversation_resolution": true,
            "required_linear_history": false
          }
          PAYLOAD
              echo "  ✓ release — branch protection applied"
            fi
          }

          BOOTSTRAPPED=0
          UPDATED=0
          PROTECTED=0
          SKIPPED=0

          for REPO in $REPOS; do
            NEEDS_TEAMS=false
            NEEDS_WORKFLOW=false

            # Team permission check — single API call
            CURRENT=$(gh api "/repos/ZySec-AI/$REPO/teams" \
              --jq '.[] | select(.slug=="org-admins") | .permission' 2>/dev/null || echo "")
            [ "$CURRENT" != "admin" ] && NEEDS_TEAMS=true

            # Bulk-fetch existing workflow filenames in one API call
            EXISTING_WFS=$(gh api "/repos/ZySec-AI/$REPO/contents/.github/workflows" \
              --jq '.[].name' 2>/dev/null || echo "")

            for WF in "${!WORKFLOWS[@]}"; do
              if ! echo "$EXISTING_WFS" | grep -qx "$WF"; then
                NEEDS_WORKFLOW=true
                break
              fi
            done

            if ! $NEEDS_TEAMS && ! $NEEDS_WORKFLOW; then
              SKIPPED=$((SKIPPED+1))
              # Still run protection drift-correct on Monday schedule
              if [ "$(date +%u)" = "1" ] || [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
                apply_branch_protection "$REPO" && PROTECTED=$((PROTECTED+1)) || true
              fi
              continue
            fi

            echo ""
            echo "→ Bootstrapping ZySec-AI/$REPO (teams=$NEEDS_TEAMS, workflows=$NEEDS_WORKFLOW)"

            if $NEEDS_TEAMS; then
              gh api -X PUT "/orgs/ZySec-AI/teams/org-admins/repos/ZySec-AI/$REPO" \
                -f permission=admin >/dev/null 2>&1 && echo "  ✓ org-admins → admin" || echo "  ⚠ org-admins team assignment skipped (403)"
              gh api -X PUT "/orgs/ZySec-AI/teams/org-maintenance/repos/ZySec-AI/$REPO" \
                -f permission=maintain >/dev/null 2>&1 && echo "  ✓ org-maintenance → maintain" || true
              gh api -X PUT "/orgs/ZySec-AI/teams/org-secops/repos/ZySec-AI/$REPO" \
                -f permission=triage >/dev/null 2>&1 && echo "  ✓ org-secops → triage" || true

              gh api -X PATCH "/repos/ZySec-AI/$REPO" \
                -F delete_branch_on_merge=true \
                -F has_wiki=false \
                -F allow_squash_merge=true \
                -F allow_merge_commit=false \
                -F allow_rebase_merge=false \
                -F allow_auto_merge=true \
                -F allow_update_branch=true \
                -F squash_merge_commit_title=PR_TITLE \
                -F squash_merge_commit_message=PR_BODY \
                -F web_commit_signoff_required=true >/dev/null 2>&1 \
                && echo "  ✓ standardised repo settings" || echo "  ⚠ repo settings skipped (403)"

              # Ensure default branch is develop
              DEFAULT=$(gh api "/repos/ZySec-AI/$REPO" --jq '.default_branch')
              if [ "$DEFAULT" != "develop" ]; then
                CURRENT_SHA=$(gh api "/repos/ZySec-AI/$REPO/git/refs/heads/$DEFAULT" \
                  --jq '.object.sha' 2>/dev/null || echo "")
                if [ -n "$CURRENT_SHA" ]; then
                  gh api -X POST "/repos/ZySec-AI/$REPO/git/refs" \
                    -f ref=refs/heads/develop \
                    -f sha="$CURRENT_SHA" 2>/dev/null || true
                  gh api -X PATCH "/repos/ZySec-AI/$REPO" \
                    -f default_branch=develop >/dev/null && echo "  ✓ default branch → develop"
                fi
              fi

              BOOTSTRAPPED=$((BOOTSTRAPPED+1))
            fi

            # Apply branch protection on every bootstrap (new repos need it)
            apply_branch_protection "$REPO" && PROTECTED=$((PROTECTED+1)) || true

            if $NEEDS_WORKFLOW; then
              TARGET_BRANCH=$(gh api "/repos/ZySec-AI/$REPO" --jq '.default_branch')

              for WF in "${!WORKFLOWS[@]}"; do
                # Skip if already present (use the bulk-fetched list)
                if echo "$EXISTING_WFS" | grep -qx "$WF"; then
                  continue
                fi

                # Fetch template content via git tree for accurate SHA
                CONTENT=$(gh api "/repos/ZySec-AI/.github/contents/workflow-templates/$WF" \
                  --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")

                if [ -z "$CONTENT" ]; then
                  echo "  ⚠ template $WF not found in .github repo, skipping"
                  continue
                fi

                ENCODED=$(printf '%s' "$CONTENT" | base64 -w0)

                gh api -X PUT "/repos/ZySec-AI/$REPO/contents/.github/workflows/$WF" \
                  -f message="ci: install $WF [bootstrap]" \
                  -f content="$ENCODED" \
                  -f branch="$TARGET_BRANCH" >/dev/null 2>&1 \
                  && echo "  ✓ installed $WF" \
                  || echo "  ⚠ failed to install $WF (may need write access)"
              done

              UPDATED=$((UPDATED+1))
            fi
          done

          echo ""
          echo "═══════════════════════════════════════════"
          echo "Bootstrapped (settings+teams): $BOOTSTRAPPED"
          echo "Updated (workflows installed): $UPDATED"
          echo "Branch protection applied:     $PROTECTED"
          echo "Already up-to-date:            $SKIPPED"
          echo "═══════════════════════════════════════════"
