name: bootstrap new repositories

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/new-repo-bootstrap.yml'
      - 'workflow-templates/*.yml'

permissions:
  contents: read

concurrency:
  group: bootstrap-new-repos
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Verify token
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          # Requires ORG_ADMIN_TOKEN with visibility=All repositories
          # and scopes: repo, workflow, admin:org
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::ORG_ADMIN_TOKEN is empty or not visible to this repo."
            exit 1
          fi
          gh auth status

      - name: Find and bootstrap repos
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          REPOS=$(gh api --paginate /orgs/ZySec-AI/repos \
            --jq '.[] | select(.archived==false) | .name')

          # All workflow templates that must exist in every repo.
          # bootstrap installs missing ones — never overwrites existing.
          declare -A WORKFLOWS=(
            # AI-assisted review & triage
            ["code-review.yml"]="AI code audit on develop push"
            ["code-review-pr.yml"]="AI PR review on open/sync"
            ["issue-triage.yml"]="AI issue triage on opened/edited"
            ["issue-auto-fix.yml"]="AI auto-fix on bot-fix-please label"
            # Branch & merge standards
            ["branch-flow-check.yml"]="branch naming + merge flow enforcement"
            # Security
            ["security.yml"]="secret scan + SAST + trivy + dep-review"
            # Quality gates
            ["quality.yml"]="lint + type-check + coverage 80%"
            # Release management
            ["release.yml"]="QA gate + GitHub Release + Teams notification"
            # Sprint process
            ["code-freeze.yml"]="code freeze reminders Thu/Fri"
            ["pr-standards.yml"]="PR description + label + milestone validation"
            ["stale.yml"]="stale PR (2d) and issue (7d) notifier"
            ["sprint-retro.yml"]="auto sprint retro issue every Friday"
            # Developer education
            ["merge-comment.yml"]="post controls summary + devops-practices links on merge to develop"
          )

          BOOTSTRAPPED=0
          UPDATED=0
          SKIPPED=0

          for REPO in $REPOS; do
            NEEDS_TEAMS=false
            NEEDS_WORKFLOW=false

            # Team permission check
            CURRENT=$(gh api "/repos/ZySec-AI/$REPO/teams" \
              --jq '.[] | select(.slug=="admins") | .permission' 2>/dev/null || echo "")
            [ "$CURRENT" != "admin" ] && NEEDS_TEAMS=true

            # Check each workflow individually (fixes old skip-all-if-any-exists bug)
            for WF in "${!WORKFLOWS[@]}"; do
              if ! gh api "/repos/ZySec-AI/$REPO/contents/.github/workflows/$WF" --silent 2>/dev/null; then
                NEEDS_WORKFLOW=true
                break
              fi
            done

            if ! $NEEDS_TEAMS && ! $NEEDS_WORKFLOW; then
              SKIPPED=$((SKIPPED+1))
              continue
            fi

            echo ""
            echo "→ Bootstrapping ZySec-AI/$REPO (teams=$NEEDS_TEAMS, workflows=$NEEDS_WORKFLOW)"

            if $NEEDS_TEAMS; then
              gh api -X PUT "/orgs/ZySec-AI/teams/admins/repos/ZySec-AI/$REPO" \
                -f permission=admin >/dev/null 2>&1 && echo "  ✓ admins → admin" || echo "  ⚠ admins team assignment skipped (403)"
              gh api -X PUT "/orgs/ZySec-AI/teams/maintenance-team/repos/ZySec-AI/$REPO" \
                -f permission=maintain >/dev/null 2>&1 && echo "  ✓ maintenance-team → maintain" || true
              gh api -X PUT "/orgs/ZySec-AI/teams/security-team/repos/ZySec-AI/$REPO" \
                -f permission=triage >/dev/null 2>&1 && echo "  ✓ security-team → triage" || true

              gh api -X PATCH "/repos/ZySec-AI/$REPO" \
                -F delete_branch_on_merge=true \
                -F has_wiki=false \
                -F allow_squash_merge=true \
                -F allow_merge_commit=false \
                -F allow_rebase_merge=false \
                -F allow_auto_merge=true \
                -F allow_update_branch=true \
                -F squash_merge_commit_title=PR_TITLE \
                -F squash_merge_commit_message=PR_BODY \
                -F web_commit_signoff_required=true >/dev/null 2>&1 \
                && echo "  ✓ standardised repo settings" || echo "  ⚠ repo settings skipped (403)"

              # Ensure default branch is develop
              DEFAULT=$(gh api "/repos/ZySec-AI/$REPO" --jq '.default_branch')
              if [ "$DEFAULT" != "develop" ]; then
                CURRENT_SHA=$(gh api "/repos/ZySec-AI/$REPO/git/refs/heads/$DEFAULT" \
                  --jq '.object.sha' 2>/dev/null || echo "")
                if [ -n "$CURRENT_SHA" ]; then
                  gh api -X POST "/repos/ZySec-AI/$REPO/git/refs" \
                    -f ref=refs/heads/develop \
                    -f sha="$CURRENT_SHA" 2>/dev/null || true
                  gh api -X PATCH "/repos/ZySec-AI/$REPO" \
                    -f default_branch=develop >/dev/null && echo "  ✓ default branch → develop"
                fi
              fi

              BOOTSTRAPPED=$((BOOTSTRAPPED+1))
            fi

            if $NEEDS_WORKFLOW; then
              TARGET_BRANCH=$(gh api "/repos/ZySec-AI/$REPO" --jq '.default_branch')

              for WF in "${!WORKFLOWS[@]}"; do
                # Skip if already present
                if gh api "/repos/ZySec-AI/$REPO/contents/.github/workflows/$WF" \
                    --silent 2>/dev/null; then
                  continue
                fi

                # Fetch template content
                CONTENT=$(gh api "/repos/ZySec-AI/.github/contents/workflow-templates/$WF" \
                  --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")

                if [ -z "$CONTENT" ]; then
                  echo "  ⚠ template $WF not found in .github repo, skipping"
                  continue
                fi

                ENCODED=$(printf '%s' "$CONTENT" | base64 -w0)

                gh api -X PUT "/repos/ZySec-AI/$REPO/contents/.github/workflows/$WF" \
                  -f message="ci: install $WF [bootstrap]" \
                  -f content="$ENCODED" \
                  -f branch="$TARGET_BRANCH" >/dev/null 2>&1 \
                  && echo "  ✓ installed $WF" \
                  || echo "  ⚠ failed to install $WF (may need write access)"
              done

              UPDATED=$((UPDATED+1))
            fi
          done

          echo ""
          echo "═══════════════════════════════════════════"
          echo "Bootstrapped (settings+teams): $BOOTSTRAPPED"
          echo "Updated (workflows installed): $UPDATED"
          echo "Already up-to-date:            $SKIPPED"
          echo "═══════════════════════════════════════════"
