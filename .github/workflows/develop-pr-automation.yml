# =============================================================================
# WORKFLOW: Develop PR Automation
# PURPOSE:  All automated actions on PRs targeting develop:
#           (1) comment  — posts ZySec PR checklist on open/reopen (no checkout)
#           (2) filter   — detects whether diff has meaningful changes
#           (3) review   — AI code review (only if filter says meaningful)
# TRIGGERS: pull_request to develop (opened, synchronize, reopened, ready_for_review)
# WHY merged: both code-review-pr and merge-comment were develop-only.
#   comment fires only on opened/reopened via if: condition.
#   filter+review fire on all 4 types. No dependency between comment and filter.
# SKIP AI:  Apply 'bot-skip' label or open as draft to suppress AI review.
# SECRETS:  ANTHROPIC_API_KEY (mapped to LLM_API_KEY in reusable)
# CONTACT:  platform-eng@zysec.ai
# =============================================================================
name: Develop PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [develop]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  # Scoped by repo+PR to avoid cross-repo collision on same PR number
  group: develop-pr-automation-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post PR checklist
    runs-on: ubuntu-latest
    # Only post on open/reopen — not on every push. No checkout needed.
    if: github.event.action == 'opened' || github.event.action == 'reopened'
    steps:
      - name: Find existing bot comment
        id: find-comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574febe99e0170f  # v3.1.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- zysec-pr-checklist -->"

      - name: Post or update ZySec PR checklist
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const pr = context.payload.pull_request;
            const actor = pr.user.login;
            const docsBase = 'https://github.com/ZySec-AI/devops-practices/blob/develop';
            const existingId = '${{ steps.find-comment.outputs.comment-id }}';
            const body = "<!-- zysec-pr-checklist -->" +
            "\n" +
            "## 👋 Hey @" + actor + " — here's what will run before this PR can merge" +
            "\n\n" +
            "All checks below are **automated and enforced**. Review them now so you're not blocked at review time." +
            "\n\n---\n\n" +
            "### 🔐 Security — will block merge if any fail\n" +
            "| Check | Tool | Fails if |\n" +
            "|-------|------|----------|\n" +
            "| Secret & credential scan (full git history) | Gitleaks | Any verified secret found |\n" +
            "| Python SAST — injection, weak crypto, hardcoded creds | Bandit | HIGH or CRITICAL severity |\n" +
            "| Deep multi-language SAST | CodeQL | Any security finding |\n" +
            "| Dependency CVE scan | Trivy | HIGH or CRITICAL CVE in deps |\n" +
            "| Container image CVE scan | Trivy | HIGH or CRITICAL CVE in image |\n" +
            "| New dependency license check | Dependency Review | Unapproved license added |\n" +
            "| New dependency CVE check | Dependency Review | HIGH+ CVE in new dep |\n\n" +
            "### ✅ Quality — will block merge if any fail\n" +
            "| Check | Tool | Fails if |\n" +
            "|-------|------|----------|\n" +
            "| Linting + format check (Python) | Ruff | Any lint or format error |\n" +
            "| Type checking (Python) | MyPy | *(advisory — does not block)* |\n" +
            "| Test coverage | pytest-cov | Coverage drops below **80%** |\n" +
            "| ESLint (TypeScript / JS) | ESLint | Any lint error |\n" +
            "| TypeScript type check | tsc | Any type error |\n" +
            "| Build check (Node) | pnpm build | Build fails |\n" +
            "| Format + lint (Rust) | cargo fmt + Clippy | Any warning |\n" +
            "| Tests (Rust) | cargo test | Any test fails |\n\n" +
            "### 🌿 Branch & PR standards — will block merge if any fail\n" +
            "| Check | Fails if |\n" +
            "|-------|----------|\n" +
            "| Branch name convention | Doesn't match `type/description` (e.g. `feat/my-feature`) |\n" +
            "| Merge flow | Invalid source → target (feature branches must target `develop`) |\n" +
            "| PR description | Body is empty or < 20 chars |\n" +
            "| PR label | No type label set |\n" +
            "| Approving review | At least 1 approval required |\n" +
            "| Resolved conversations | All comments must be resolved |\n\n" +
            "### 🤖 AI review — advisory, does not block\n" +
            "An AI reviewer will post inline comments on security, quality, and logic issues. It won't block merge but findings are worth addressing.\n\n" +
            "---\n\n" +
            "<details>\n<summary>🌿 Branch naming quick reference</summary>\n\n" +
            "**Format:** `type/short-description` — lowercase, hyphens only\n\n" +
            "| Prefix | Use for |\n|--------|--------|\n" +
            "| `feat/` or `feature/` | New features |\n" +
            "| `fix/` or `bugfix/` | Bug fixes |\n" +
            "| `hotfix/` | Urgent production fixes only |\n" +
            "| `chore/` | Maintenance, deps, config |\n" +
            "| `docs/` | Documentation only |\n" +
            "| `refactor/` | Refactoring without behaviour change |\n" +
            "| `test/` | Test additions or fixes |\n" +
            "| `ci/` | CI/CD pipeline changes |\n\n" +
            "**Good:** `feat/oauth-login` · `fix/cors-header-leak` · `chore/bump-fastapi-0.112`\n\n" +
            "**Standard flow:** `feat/… → develop → stage → release`\n\n" +
            "</details>\n\n" +
            "<details>\n<summary>🏷️ Labels you should set on this PR</summary>\n\n" +
            "Add exactly one type label — the PR standards check will fail without it:\n\n" +
            "| Label | When to use |\n|-------|------------|\n" +
            "| `feat` / `feature` | New functionality |\n" +
            "| `bug` / `fix` | Defect or regression |\n" +
            "| `chore` | Maintenance, deps, config |\n" +
            "| `docs` | Documentation only |\n\n" +
            "Other useful labels:\n" +
            "| Label | Effect |\n|-------|--------|\n" +
            "| `hotfix` | Bypasses code freeze, fast-tracks review |\n" +
            "| `bot-skip` | Skips AI review and rebase check for this PR |\n" +
            "| `bot-fix-please` | Ask the AI to raise a fix PR for an issue |\n\n" +
            "</details>\n\n---\n\n" +
            "📚 **Learn more:** [ZySec Engineering Practices](https://github.com/ZySec-AI/devops-practices) · [Branch Strategy](" + docsBase + "/03-Operational-Practices/branch-strategy.md) · [Secure Coding](" + docsBase + "/05-Security-and-Governance/secure-coding-guidelines.md)\n\n" +
            "*This comment updates automatically if you push new commits.*";
            if (existingId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(existingId),
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

  filter:
    name: Check if AI review needed
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Check diff for meaningful changes
        id: check
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE".."$HEAD" 2>/dev/null || echo "")
          TOTAL=$(echo "$CHANGED" | grep -c . || echo 0)
          MEANINGFUL=$(echo "$CHANGED" | grep -vcE '\.(lock|md|txt|json|ya?ml|toml|env\.example|gitignore|prettierrc|eslintrc)$' || echo 0)
          echo "Total files: $TOTAL, Meaningful: $MEANINGFUL"
          if [ "$MEANINGFUL" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Only trivial files changed — skipping AI review"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  review:
    name: AI Code Review
    needs: filter
    if: |
      needs.filter.outputs.skip == 'false' &&
      !contains(github.event.pull_request.labels.*.name, 'bot-skip') &&
      github.event.pull_request.draft == false
    uses: ZySec-AI/.github/.github/workflows/_reusable-code-review.yml@main
    secrets:
      LLM_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
    with:
      mode: pr-review
      fail_on: NEVER