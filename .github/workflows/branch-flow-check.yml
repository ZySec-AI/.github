name: validate-branch-flow

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  pull-requests: read
  contents: read

jobs:
  branch-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name (Conventional Commits)
        run: |
          BRANCH="${{ github.head_ref }}"

          # Allowed prefixes — broad enough for real teams
          # Body allows: letters (any case), digits, hyphens, underscores, dots, slashes
          PATTERN='^(feat|feature|fix|bugfix|bug|hotfix|chore|docs|doc|documentation|refactor|test|tests|perf|performance|build|ci|cd|cicd|revert|release-prep|support|experiment|exp|spike|task|improve|improvement)/[a-zA-Z0-9][a-zA-Z0-9._/-]*$'
          EXEMPT='^(develop|stage|main|release|release/.+|staging)$'

          if [[ "$BRANCH" =~ $EXEMPT ]] || [[ "$BRANCH" =~ $PATTERN ]]; then
            echo "✓ Branch name valid: $BRANCH"
          else
            echo "⚠️ Branch name '$BRANCH' looks unusual."
            echo ""
            echo "Recommended format: type/short-description"
            echo ""
            echo "Allowed prefixes:"
            echo "  feat | feature | fix | bugfix | bug | hotfix | chore"
            echo "  docs | doc | documentation | refactor | test | tests"
            echo "  perf | performance | build | ci | cd | cicd | revert"
            echo "  release-prep | support | experiment | exp | spike | task | improve"
            echo ""
            echo "Examples: feat/oauth-login  fix/JIRA-123  chore/bump-deps  feat/user/auth"
            echo "This is a WARNING only — the check still passes."
          fi

      - name: Validate merge flow
        run: |
          SRC="${{ github.head_ref }}"
          DST="${{ github.base_ref }}"
          echo "Flow: $SRC → $DST"

          case "$DST" in
            develop)
              [[ "$SRC" =~ ^(stage|release)$ ]] && { echo "✓ back-merge: $SRC → develop"; exit 0; }
              echo "✓ $SRC → develop"
              ;;
            stage|staging)
              [[ "$SRC" == "develop" ]] && { echo "✓ promote: develop → $DST"; exit 0; }
              echo "❌ Only 'develop' may promote to '$DST'"; exit 1
              ;;
            release|release/*)
              if [[ "$SRC" == "develop" || "$SRC" == "stage" || "$SRC" == "staging" || "$SRC" =~ ^hotfix/ ]]; then
                echo "✓ $SRC → $DST"
                exit 0
              fi
              echo "❌ Only 'develop', 'stage', or 'hotfix/*' may merge into release"; exit 1
              ;;
            main)
              if [[ "$SRC" == "release" || "$SRC" =~ ^release/ || "$SRC" =~ ^hotfix/ ]]; then
                echo "✓ $SRC → main"
                exit 0
              fi
              echo "❌ Direct merge to main is not allowed. Path: develop → release → main."
              exit 1
              ;;
            *)
              echo "⚠️ Merging into '$DST' — verify this is intentional (non-standard target)"
              ;;
          esac
