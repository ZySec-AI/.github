name: Code Review (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [develop, stage]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: code-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      !contains(github.event.pull_request.labels.*.name, 'bot-skip') &&
      github.event.pull_request.draft == false
    uses: ./.github/workflows/_reusable-code-review.yml
    secrets:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
    with:
      mode: pr-review
      fail_on: NEVER
