name: Code Review (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [develop]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      !contains(github.event.pull_request.labels.*.name, 'bot-skip') &&
      github.event.pull_request.draft == false
    uses: ZySec-AI/.github/.github/workflows/_reusable-code-review.yml@main
    secrets: inherit
    with:
      mode: pr-review
      fail_on: NEVER