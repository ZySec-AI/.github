# =============================================================================
# WORKFLOW: Sprint Retro Generator
# PURPOSE:  Creates a sprint retrospective issue every Friday with live metrics
# TRIGGERS: schedule (Friday 09:30 UTC = 3 PM IST), workflow_dispatch
# SECRETS:  ORG_ADMIN_TOKEN (or github.token with issues:write)
# FIX:      date -d '7 days ago' (Linux) vs date -v-7d (macOS) are incompatible.
#           Replaced with python3 one-liner that works on both platforms.
# CONTACT:  platform-eng@zysec.ai
# =============================================================================
name: Sprint Retro Generator

on:
  schedule:
    - cron: '30 9 * * 5'  # Friday 09:30 UTC (3 PM IST — after code freeze)
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read

jobs:
  retro:
    name: Create sprint retro issue
    runs-on: ubuntu-latest
    steps:
      - name: Generate retro issue
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          WEEK=$(date +%Y-W%V)
          DATE=$(date +%Y-%m-%d)

          # FIX: use python3 for cross-platform date arithmetic.
          # 'date -d "7 days ago"' works on Linux (GitHub-hosted runners) but
          # NOT on macOS (self-hosted). 'date -v-7d' is macOS-only.
          # python3 datetime is available on both — use it for portability.
          WEEK_AGO=$(python3 -c "
          from datetime import date, timedelta
          print((date.today() - timedelta(days=7)).strftime('%Y-%m-%dT%H:%M:%SZ'))
          ")

          MERGED_PRS=$(gh pr list --repo "$REPO" --state merged \
            --json number,mergedAt \
            --jq "[.[] | select(.mergedAt > \"$WEEK_AGO\")] | length" \
            2>/dev/null || echo "N/A")

          OPEN_PRS=$(gh pr list --repo "$REPO" --state open --json number \
            --jq 'length' 2>/dev/null || echo "N/A")
          OPEN_ISSUES=$(gh issue list --repo "$REPO" --state open --json number \
            --jq 'length' 2>/dev/null || echo "N/A")
          BUGS=$(gh issue list --repo "$REPO" --state open --label "type:bug" \
            --json number --jq 'length' 2>/dev/null || echo "N/A")

          # Idempotency: skip if retro already exists this week
          EXISTING=$(gh issue list --repo "$REPO" --state open \
            --search "Sprint Retro $WEEK" --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Retro issue #$EXISTING already exists for $WEEK"
            exit 0
          fi

          gh issue create \
            --repo "$REPO" \
            --title "Sprint Retro — $WEEK ($DATE)" \
            --label "type:chore" \
            --body "## Sprint Retrospective — $WEEK

### Metrics
| Metric | Value |
|--------|-------|
| PRs merged (last 7 days) | $MERGED_PRS |
| Open PRs | $OPEN_PRS |
| Open issues | $OPEN_ISSUES |
| Open bugs | $BUGS |

