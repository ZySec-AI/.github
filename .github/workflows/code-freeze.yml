# =============================================================================
# WORKFLOW: Code Freeze Reminder
# PURPOSE:  Creates GitHub issues Thu/Fri to remind team of code freeze windows
# TRIGGERS: schedule (Thu 08:00 UTC = soft, Fri 02:00 UTC = hard), workflow_dispatch
# SECRETS:  ORG_ADMIN_TOKEN — needed because github.token scope is per-repo;
#           ORG_ADMIN_TOKEN allows creating issues across all org repos
# WHY permissions: original file had `permissions: {}` which was misleading —
#   the job uses ORG_ADMIN_TOKEN (not GITHUB_TOKEN) so the block was silent
# CONTACT:  platform-eng@zysec.ai
# =============================================================================
name: Code Freeze Reminders

on:
  schedule:
    - cron: '0 8 * * 4'   # Thursday 08:00 UTC — soft freeze warning (Thu 1:30 PM IST)
    - cron: '0 2 * * 5'   # Friday   02:00 UTC — hard freeze (Fri 7:30 AM IST, 1hr pre-freeze)
  workflow_dispatch:
    inputs:
      type:
        description: 'soft or hard freeze reminder'
        required: true
        default: 'soft'
        type: choice
        options: [soft, hard]

permissions:
  issues: write   # FIX: was `permissions: {}` — document actual requirement clearly

jobs:
  remind:
    name: Post freeze reminder
    runs-on: ubuntu-latest
    steps:
      - name: Determine freeze type
        id: freeze
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ inputs.type }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" == "4" ]; then
            echo "type=soft" >> $GITHUB_OUTPUT
          else
            echo "type=hard" >> $GITHUB_OUTPUT
          fi

      - name: Create freeze reminder issue
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          # FIX: use python3 for date — 'date -d' (Linux) vs 'date -v' (macOS)
          # differ and break on GitHub-hosted runners intermittently
          DATE=$(python3 -c "from datetime import date; print(date.today())")
          TYPE="${{ steps.freeze.outputs.type }}"

          if [ "$TYPE" == "hard" ]; then
            TITLE="🔒 Code Freeze TODAY — $DATE"
            BODY="## Hard Code Freeze

**All PRs must be merged by 3:00 PM IST today.**

After freeze:
- No new features merged to \`develop\`
- Only critical hotfixes allowed (use \`hotfix\` label fast-track)
- RC branch will be cut for QA validation

> Auto-generated by code-freeze workflow"
            LABEL="type:chore"
          else
            TITLE="⚠️ Code Freeze TOMORROW — $DATE"
            BODY="## Soft Freeze Reminder

Code freeze is **tomorrow (Friday) at 3:00 PM IST**.

- Complete outstanding PRs
- Get reviews approved
- Resolve any blocking issues

> Auto-generated by code-freeze workflow"
            LABEL="type:chore"
          fi

          # Idempotency: skip if already created today
          EXISTING=$(gh issue list --repo "$REPO" --state open \
            --search "Code Freeze $DATE" --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Freeze issue #$EXISTING already exists for $DATE — skipping"
            exit 0
          fi

          gh issue create \
            --repo "$REPO" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "$LABEL" \
            2>/dev/null || echo "::warning::Issue creation skipped (label may not exist — run sync-labels first)"