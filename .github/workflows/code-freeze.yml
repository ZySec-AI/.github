name: Code Freeze Reminders

on:
  schedule:
    - cron: '0 8 * * 4'   # Thursday 08:00 UTC — soft freeze warning
    - cron: '0 2 * * 5'   # Friday   02:00 UTC — hard freeze (1 hr before 3 PM IST)
  workflow_dispatch:
    inputs:
      type:
        description: 'soft or hard freeze reminder'
        required: true
        default: 'soft'
        type: choice
        options: [soft, hard]

permissions: {}

jobs:
  remind:
    name: Post freeze reminder
    runs-on: ubuntu-latest
    steps:
      - name: Determine freeze type
        id: freeze
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ inputs.type }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" == "4" ]; then
            echo "type=soft" >> $GITHUB_OUTPUT
          else
            echo "type=hard" >> $GITHUB_OUTPUT
          fi

      - name: Create freeze reminder issue
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          DATE=$(date +%Y-%m-%d)
          TYPE="${{ steps.freeze.outputs.type }}"

          if [ "$TYPE" == "hard" ]; then
            TITLE="🔒 Code Freeze TODAY — $DATE"
            BODY="## Hard Code Freeze\n\n**All PRs must be merged by 3:00 PM IST today.**\n\nAfter freeze:\n- No new features merged to \`develop\`\n- Only critical hotfixes allowed\n- RC branch will be cut for QA validation\n\n> Auto-generated by code-freeze workflow"
            LABEL="type:chore"
          else
            TITLE="⚠️ Code Freeze TOMORROW — $DATE"
            BODY="## Soft Freeze Reminder\n\nCode freeze is **tomorrow (Friday) at 3:00 PM IST**.\n\n- Complete outstanding PRs\n- Get reviews approved\n- Resolve any blocking issues\n\n> Auto-generated by code-freeze workflow"
            LABEL="type:chore"
          fi

          # Check if open freeze issue already exists for today
          EXISTING=$(gh issue list --repo "$REPO" --state open --search "Code Freeze $DATE" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Freeze issue #$EXISTING already exists for $DATE, skipping."
            exit 0
          fi

          gh issue create \
            --repo "$REPO" \
            --title "$TITLE" \
            --body "$(printf "$BODY")" \
            --label "$LABEL" \
            2>/dev/null || echo "Issue creation skipped (labels may not exist yet)"