# =============================================================================
# WORKFLOW: AI Issue Auto-Fix
# PURPOSE:  When 'bot-fix-please' label is applied to an issue, runs LLM to
#           attempt an automated fix and open a PR
# TRIGGERS: issues (labeled)
# SECRETS:  ANTHROPIC_API_KEY (mapped to LLM_API_KEY in reusable)
# HOW TO USE: Apply the 'bot-fix-please' label to any issue
# CONTACT:  platform-eng@zysec.ai
# =============================================================================
name: Issue Auto-Fix

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix:
    if: github.event.label.name == 'bot-fix-please'
    uses: ZySec-AI/.github/.github/workflows/_reusable-code-review.yml@main
    secrets:
      # FIX: was ANTHROPIC_API_KEY — reusable expects LLM_API_KEY
      LLM_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
    with:
      mode: issue-fix
      fail_on: NEVER