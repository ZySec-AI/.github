# =============================================================================
# WORKFLOW: Reusable — Release
# PURPOSE:  Ancestry guard → qa-approved gate → changelog → GitHub release
#           → Teams notification
# TRIGGERS: workflow_call
# INPUTS:   environment (string), notify (bool)
# SECRETS:  ORG_ADMIN_TOKEN (required), TEAMS_WEBHOOK (optional)
# CONTACT:  platform-eng@zysec.ai | #releases
# =============================================================================
name: release (reusable)

on:
  workflow_call:
    inputs:
      environment:
        type: string
        default: production
      notify:
        type: boolean
        default: true
    secrets:
      ORG_ADMIN_TOKEN:
        required: true
      TEAMS_WEBHOOK:
        required: false

jobs:
  guard:
    name: Guard — develop must be ancestor of release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Verify ancestry
        run: |
          set -euo pipefail
          git fetch --no-tags origin develop:refs/remotes/origin/develop 2>/dev/null || true
          REF="${{ github.sha }}"

          # FIX: guard was inverted. Old code checked `is-ancestor $REF develop`
          # which asks "is the release commit in develop's history?" — wrong.
          # Correct check: "is develop in the release commit's history?"
          # i.e. develop must be an ancestor of the release commit.
          if git merge-base --is-ancestor origin/develop "$REF"; then
            echo "✓ develop is an ancestor of the release commit — guard passed"
          else
            echo "::error title=Ancestry Guard Failed::This release commit does not include all develop changes."
            echo "Fix: git checkout <release-branch> && git merge develop && git push"
            exit 1
          fi

  qa-gate:
    name: QA Sign-off Gate
    runs-on: ubuntu-latest
    needs: guard
    if: github.event_name == 'pull_request'
    steps:
      - name: Check qa-approved label
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          RESPONSE=$(gh api /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/labels 2>/dev/null || echo "[]")
          if echo "$RESPONSE" | grep -q '"message"'; then
            echo "::error::Could not fetch PR labels (API error). Check ORG_ADMIN_TOKEN permissions."
            exit 1
          fi
          LABELS=$(echo "$RESPONSE" | jq -r '.[].name' 2>/dev/null || echo "")
          echo "Labels: $LABELS"
          if echo "$LABELS" | grep -q "qa-approved"; then
            echo "✓ qa-approved label present"
          else
            echo "::error title=QA Gate Failed::This PR requires the 'qa-approved' label before merging to release."
            echo "The QA team must validate on stage and apply the label."
            exit 1
          fi

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      version: ${{ steps.version.outputs.version }}
      notes_file: /tmp/release-notes.md
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            PATCH=$(echo "$LAST" | awk -F. '{print $3+1}')
            VERSION="${LAST%.*}.$PATCH"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build release notes
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          # FIX: was fetching ALL closed PRs with no date filter — returned same
          # stale list on every release. Now filtered to PRs since the last tag.
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            TAG_DATE=$(git log -1 --format=%aI "$LAST_TAG" 2>/dev/null || echo "1970-01-01T00:00:00Z")
            echo "Generating changelog since $LAST_TAG ($TAG_DATE)"
            gh api /repos/${{ github.repository }}/pulls \
              -f state=closed \
              -f base=release \
              --paginate \
              --jq --arg since "$TAG_DATE" \
              '.[] | select(.merged_at != null and .merged_at > $since) | [.number, .title] | @tsv' \
              > /tmp/pr_list.tsv 2>/dev/null || echo "" > /tmp/pr_list.tsv
          else
            echo "No previous tag — using last 50 merged PRs"
            gh api /repos/${{ github.repository }}/pulls \
              -f state=closed \
              -f base=release \
              --paginate \
              --jq '.[] | select(.merged_at != null) | [.number, .title] | @tsv' \
              > /tmp/pr_list.tsv 2>/dev/null | head -50 || echo "" > /tmp/pr_list.tsv
          fi

          # FIX: build release notes via file — avoids shell injection from PR titles.
          # PR titles containing $(...), backticks, or quotes would otherwise execute
          # as shell when interpolated via ${{ steps.notes.outputs.notes }}.
          {
            echo "## Changes"
            echo ""
            if [ -s /tmp/pr_list.tsv ]; then
              while IFS=$'\t' read -r num title; do
                printf -- "- #%s %s\n" "$num" "$title"
              done < /tmp/pr_list.tsv
            else
              echo "- See commit history for changes"
            fi
          } > /tmp/release-notes.md

          echo "Release notes preview:"
          cat /tmp/release-notes.md

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: release-notes
          path: /tmp/release-notes.md
          retention-days: 7

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [guard, changelog]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628f2b799aa4d91fb8f  # v4.3.0
        with:
          name: release-notes
          path: /tmp/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          VERSION="${{ needs.changelog.outputs.version }}"
          git tag "$VERSION" 2>/dev/null || true
          git push origin "$VERSION" 2>/dev/null || true

          # FIX: use --notes-file instead of --notes "$NOTES"
          # --notes with a variable interpolated from workflow outputs is a
          # shell injection risk when PR titles contain special characters
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes-file /tmp/release-notes.md \
            --latest \
            2>/dev/null || \
          gh release edit "$VERSION" \
            --title "Release $VERSION" \
            --notes-file /tmp/release-notes.md \
            --latest

          echo "✓ GitHub Release $VERSION created"

  notify:
    name: Notify Teams
    runs-on: ubuntu-latest
    needs: [github-release, changelog]
    # FIX: was `if: inputs.notify && always()` — fired even when guard failed,
    # sending a confusing "release failed" notification when no release was attempted.
    # Now only fires if the release job actually ran (success or failure).
    if: inputs.notify && needs.github-release.result != 'skipped'
    steps:
      - name: Post Teams notification
        env:
          HAS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK != '' }}
          WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
        if: env.HAS_WEBHOOK == 'true'
        run: |
          VERSION="${{ needs.changelog.outputs.version }}"
          REPO="${{ github.repository }}"
          STATUS="${{ needs.github-release.result }}"
          COLOR=$([ "$STATUS" == "success" ] && echo "00CC00" || echo "CC0000")
          EMOJI=$([ "$STATUS" == "success" ] && echo "✅" || echo "❌")

          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"@context\": \"https://schema.org/extensions\",
              \"themeColor\": \"$COLOR\",
              \"summary\": \"Release $VERSION — $STATUS\",
              \"sections\": [{
                \"activityTitle\": \"$EMOJI Release $VERSION\",
                \"activitySubtitle\": \"$REPO\",
                \"facts\": [
                  {\"name\": \"Status\",      \"value\": \"$STATUS\"},
                  {\"name\": \"Version\",     \"value\": \"$VERSION\"},
                  {\"name\": \"Triggered by\",\"value\": \"${{ github.actor }}\"}
                ]
              }]
            }"