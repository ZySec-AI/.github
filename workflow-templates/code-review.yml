name: Code Review (auto on develop)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    uses: ZySec-AI/.github/.github/workflows/_reusable-code-review.yml@main
    secrets: inherit
    with:
      mode: audit
      image_tag: latest
      fail_on: CRITICAL
