name: Code Review (auto on develop)

on:
  push:
    branches: [develop]
  pull_request:
    types: [closed]
    branches: [develop]
  workflow_dispatch:

jobs:
  review:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    uses: ZySec-AI/.github/.github/workflows/_reusable-code-review.yml@main
    secrets: inherit
    with:
      image_tag: latest
      fail_on: CRITICAL
