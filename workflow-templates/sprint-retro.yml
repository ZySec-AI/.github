name: Sprint Retro Generator

on:
  schedule:
    - cron: '30 9 * * 5'  # Friday 09:30 UTC (3 PM IST — after code freeze)
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read

jobs:
  retro:
    name: Create sprint retro issue
    runs-on: ubuntu-latest
    steps:
      - name: Generate retro issue
        env:
          GH_TOKEN: ${{ secrets.ORG_BOOTSTRAP_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          WEEK=$(date +%Y-W%V)
          DATE=$(date +%Y-%m-%d)

          # Collect metrics from last 7 days
          MERGED_PRS=$(gh pr list --repo "$REPO" --state merged \
            --json number,title,mergedAt \
            --jq "[.[] | select(.mergedAt > \"$(date -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -v-7d +%Y-%m-%dT%H:%M:%SZ)\")] | length" \
            2>/dev/null || echo "N/A")

          OPEN_PRS=$(gh pr list --repo "$REPO" --state open --json number --jq 'length' 2>/dev/null || echo "N/A")
          OPEN_ISSUES=$(gh issue list --repo "$REPO" --state open --json number --jq 'length' 2>/dev/null || echo "N/A")
          BUGS=$(gh issue list --repo "$REPO" --state open --label "type:bug" --json number --jq 'length' 2>/dev/null || echo "N/A")

          # Check if retro issue already exists this week
          EXISTING=$(gh issue list --repo "$REPO" --state open \
            --search "Sprint Retro $WEEK" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Retro issue #$EXISTING already exists for $WEEK"
            exit 0
          fi

          gh issue create \
            --repo "$REPO" \
            --title "Sprint Retro — $WEEK ($DATE)" \
            --label "type:chore" \
            --body "## Sprint Retrospective — $WEEK

          ### Metrics
          | Metric | Value |
          |--------|-------|
          | PRs merged (last 7 days) | $MERGED_PRS |
          | Open PRs | $OPEN_PRS |
          | Open issues | $OPEN_ISSUES |
          | Open bugs | $BUGS |

          ---

          ### What went well? ✅
          <!-- List 3 things that worked this sprint -->
          -
          -
          -

          ### What didn't go well? ❌
          <!-- List blockers, pain points, delays -->
          -
          -
          -

          ### Action items 🎯
          <!-- Specific, ownable improvements for next sprint -->
          - [ ] Owner:
          - [ ] Owner:
          - [ ] Owner:

          ### Notes
          <!-- Any additional context, shoutouts, decisions made -->

          ---
          > Auto-generated by sprint-retro workflow" \
            2>/dev/null || echo "Retro issue creation skipped"
