name: Docs to Wiki

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without pushing to wiki'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  wiki:
    uses: ZySec-AI/.github/.github/workflows/_reusable-docs-to-wiki.yml@develop
    with:
      wiki_files: 'README.md,product.md,architecture.md,technology.md,implementation.md,api.md'
      generate_sidebar: true
      dry_run: ${{ inputs.dry_run || false }}
