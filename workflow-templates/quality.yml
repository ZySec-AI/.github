name: Quality Gates

on:
  pull_request:
    branches: [develop, stage]
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  gates:
    uses: ZySec-AI/.github/.github/workflows/_reusable-quality.yml@main
    secrets: inherit
    with:
      python: ${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements*.txt', 'setup.py', 'setup.cfg') != '' }}
      node: ${{ hashFiles('package.json', 'pnpm-lock.yaml', 'yarn.lock', 'package-lock.json') != '' }}
      rust: ${{ hashFiles('Cargo.toml') != '' }}
      coverage_threshold: 80
